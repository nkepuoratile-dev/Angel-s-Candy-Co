<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comments & Reviews - Candy Store</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Top Banner -->
    <div class="top-banner">
        <p>Free Shipping On Orders $100+ <a href="shop.html" class="shop-now">SHOP NOW →</a></p>
    </div>

    <!-- Header -->
    <header>
        <div class="header-container">
            <div class="logo">
                <h1>Candy <span>STORE</span></h1>
            </div>
            <div class="header-icons">
                <a href="cart.html"><i class="fas fa-shopping-cart"></i></a>
            </div>
        </div>
    </header>

    <!-- Reviews Content -->
    <div class="page-container">
        <h1 class="page-title">Customer Reviews</h1>
        
        <div class="reviews-container">
            <div class="reviews-summary">
                <div class="average-rating">
                    <h2>4.8</h2>
                    <div class="stars">
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star-half-alt"></i>
                    </div>
                    <p>Based on 1,234 reviews</p>
                </div>
                
                <div class="write-review">
                    <h3>Write a Review</h3>
                    <form>
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" required>
                        </div>
                        <div class="form-group">
                            <label for="rating">Rating</label>
                            <select id="rating">
                                <option>5 Stars</option>
                                <option>4 Stars</option>
                                <option>3 Stars</option>
                                <option>2 Stars</option>
                                <option>1 Star</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="review">Your Review</label>
                            <textarea id="review" rows="4" required></textarea>
                        </div>
                        <button type="submit" class="btn-primary">Submit Review</button>
                    </form>
                </div>
            </div>
            
            <div class="reviews-list">
                <h3>Latest Reviews</h3>
                
                <div class="review-card">
                    <div class="review-header">
                        <h4>Sarah Johnson</h4>
                        <div class="stars">
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                            <i class="fas fa-star"></i>
                        </div>
