<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Candy Store</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
     /* ===== CHECKOUT PAGE ===== */
        .checkout-container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }

        .checkout-form {
            background-color: var(--white);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.05);
        }

        .form-section {
            margin-bottom: 30px;
        }

        .form-section h2 {
            color: var(--burgundy);
            margin-bottom: 20px;
            font-size: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--dark);
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid var(--pink);
            border-radius: 5px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--burgundy);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .payment-options {
            margin-bottom: 20px;
        }

        .payment-option {
            display: block;
            margin-bottom: 10px;
        }

        .payment-option input {
            margin-right: 10px;
        }

        .credit-card-form {
            background-color: var(--pink-light);
            padding: 20px;
            border-radius: 5px;
        }

        .place-order-btn {
            width: 100%;
            padding: 15px;
            font-size: 16px;
        }

        .order-summary {
            background-color: var(--pink-light);
            padding: 25px;
            border-radius: 10px;
            height: fit-content;
        }

        .order-summary h3 {
            color: var(--burgundy);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--pink);
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 10px 0;
            border-bottom: 1px solid var(--pink);
        }
</style>
</head>
<body>
    <!-- Top Banner -->
    <div class="top-banner">
        <p>Free Shipping On Orders $100+ <a href="shop.html" class="shop-now">SHOP NOW →</a></p>
    </div>

    <!-- Header -->
    <header>
        <div class="header-container">
            <div class="logo">
                <h1>Candy <span>STORE</span></h1>
            </div>
            <div class="header-icons">
                <a href="cart.html"><i class="fas fa-shopping-cart"></i></a>
            </div>
        </div>
    </header>

    <!-- Checkout Content -->
    <div class="page-container">
        <h1 class="page-title">Checkout</h1>
        
        <div class="checkout-container">
            <div class="checkout-form">
                <div class="form-section">
                    <h2>Shipping Information</h2>
                    <form>
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" required>
                        </div>
                        <div class="form-group">
                            <label for="address">Address</label>
                            <input type="text" id="address" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="city">City</label>
                                <input type="text" id="city" required>
                            </div>
                            <div class="form-group">
                                <label for="zip">ZIP Code</label>
                                <input type="text" id="zip" required>
                            </div>
                        </div>
                    </form>
                </div>
                
                <div class="form-section">
                    <h2>Payment Method</h2>
                    <div class="payment-options">
                        <label class="payment-option">
                            <input type="radio" name="payment" checked> Credit Card
                        </label>
                        <label class="payment-option">
                            <input type="radio" name="payment"> PayPal
                        </label>
                    </div>
                    
                    <div class="credit-card-form">
                        <div class="form-group">
                            <label for="card">Card Number</label>
                            <input type="text" id="card" placeholder="**** **** **** ****">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="expiry">Expiry Date</label>
                                <input type="text" id="expiry" placeholder="MM/YY">
                            </div>
                            <div class="form-group">
                                <label for="cvv">CVV</label>
                                <input type="text" id="cvv" placeholder="***">
                            </div>
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="btn-primary place-order-btn">Place Order</button>
            </div>
            
            <div class="order-summary">
                <h3>Your Order</h3>
                <div class="order-items">
                    <div class="order-item">
                        <span>Gummy Bears x2</span>
                        <span>$9.98</span>
                    </div>
                    <div class="order-item">
                        <span>Chocolate Bar x1</span>
                        <span>$3.99</span>
                    </div>
                </div>
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span>$13.97</span>
                </div>
                <div class="summary-row total">
                    <span>Total:</span>
                    <span>$13.97</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h4>Quick Links</h4>
                <ul>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="contact.html">Contact Us</a></li>
                </ul>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Candy Store. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
